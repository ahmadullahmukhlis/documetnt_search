name: Build Windows Release
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Generate and Sign Certificate
        shell: pwsh
        run: |
          # 1. Create a self-signed certificate
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Document Search" -KeyUsage DigitalSignature -FriendlyName "DocSearchCert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          
          # 2. Export it to a .pfx file with a temporary password
          $password = ConvertTo-SecureString -String "1234" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "github_actions_cert.pfx" -Password $password

      - name: Create MSIX Installer
        # Use the generated certificate to sign the installer
        run: >
          dart run msix:create 
          --display-name="Document Search" 
          --publisher="CN=Document Search"
          --certificate-path="github_actions_cert.pfx" 
          --certificate-password="1234"

      - name: Upload MSIX Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/**/Release/*.msix
          if-no-files-found: error
