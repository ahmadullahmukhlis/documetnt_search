name: Build Windows Release
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Create MSIX Installer
        # This creates the .msix file which is the actual installer for Windows 10/11
        run: dart run msix:create --display-name="Document Search" --install-certificate=false

      - name: Upload MSIX Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # This path specifically picks only the installer file, avoiding archives
          path: build/windows/**/Release/*.msix
          if-no-files-found: error
