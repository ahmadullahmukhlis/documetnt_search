name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libmpv-dev \
            liblzma-dev
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - name: Install fastforge
        run: dart pub global activate fastforge
      - name: Package DEB
        run: dart pub global run fastforge:main package --platform linux --targets deb
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/**

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - name: Install fastforge
        run: dart pub global activate fastforge
      - name: Package EXE
        shell: bash
        run: dart pub global run fastforge:main package --platform windows --targets exe
      - name: Generate self-signed cert (testing)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=VidBuddy Test" `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $pwd = ConvertTo-SecureString -String "vidbuddy-test" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\vidbuddy-test.pfx" -Password $pwd
          Export-Certificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\vidbuddy-test.cer"
      - name: Sign EXE (testing)
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Path
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) { throw "signtool.exe not found" }
          $pwd = ConvertTo-SecureString -String "vidbuddy-test" -Force -AsPlainText
          $exeFiles = @()
          $exeFiles += Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Recurse -Filter *.exe -ErrorAction SilentlyContinue
          $exeFiles += Get-ChildItem "$env:GITHUB_WORKSPACE\build\windows" -Recurse -Filter *.exe -ErrorAction SilentlyContinue
          $exeFiles = $exeFiles | Select-Object -Unique
          if ($exeFiles.Count -eq 0) { throw "No EXE files found to sign" }
          foreach ($exe in $exeFiles) {
            & $signtool sign /f "$env:GITHUB_WORKSPACE\vidbuddy-test.pfx" /p "vidbuddy-test" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $exe.FullName
          }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/**
            vidbuddy-test.cer

  macos-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - name: Install fastforge
        run: dart pub global activate fastforge
      - name: Package PKG
        run: dart pub global run fastforge:main package --platform macos --targets pkg
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/**

  publish-release:
    needs: [linux-deb, windows-exe, macos-pkg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          body_path: release-notes.md
          files: dist-artifacts/**/*
